<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Imam Hussain Foundation</title>
    <link rel="manifest" href="manifest.json">
    <style>
        body { font-family: sans-serif; margin: 0; background: #f4f4f4; text-align: center; }
        header { background: #005a8d; color: white; padding: 20px; }
        .card { background: white; margin: 15px; padding: 20px; border-radius: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        button { background: #005a8d; color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; }
    </style>
</head>
<body>
    <header>
        <h1>Welcome To The Imam Hussain Foundation</h1>
    </header>
    <div class="card">
        <h3>Imam Hussain Hospital</h3>
        <p>Bemina, Srinagar</p>
        <button onclick="alert('Calling Hospital...')">Call Emergency</button>
    </div>
    <div class="card">
        <h3>Services</h3>
        <p>Blood Bank | Paramedical College</p>
    </div>

    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js');
        }
    </script>
</body>
</html>
